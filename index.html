<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио Видеооператора</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
    </style>
</head>
<body class="selection:bg-neutral-800 selection:text-white">

    <header class="max-w-5xl mx-auto px-6 pt-20 pb-12 border-b border-neutral-900">
        <h1 id="user-name" class="text-4xl font-semibold tracking-tight text-white mb-2">Загрузка...</h1>
        <p id="user-subtitle" class="text-neutral-400 text-lg mb-6"></p>
        <p id="user-bio" class="text-neutral-500 max-w-2xl leading-relaxed"></p>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-16">
        <h2 class="text-xs font-semibold text-neutral-400 mb-8 tracking-wider uppercase">Избранные работы</h2>
        
        <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12"></div>
    </main>

    <footer class="max-w-5xl mx-auto px-6 py-12 border-t border-neutral-900 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h4 class="text-white font-medium mb-1">Нужен исходный материал?</h4>
            <p class="text-sm text-neutral-500">Посмотрите полные архивы съемок напрямую.</p>
        </div>
        <div class="flex gap-4">
            <a id="disk-button" href="#" target="_blank" class="px-6 py-3 bg-neutral-900 border border-neutral-800 rounded-md text-sm font-medium hover:bg-neutral-800 text-white transition-all">
                📁 Открыть Диск с работами
            </a>
        </div>
    </footer>

    <script>
        // Функция для правильного отображения плееров YouTube/Vimeo
        function formatVideoUrl(url) {
            if (url.includes('youtube.com/watch?v=')) return url.replace('watch?v=', 'embed/');
            if (url.includes('youtu.be/')) return url.replace('youtu.be/', 'youtube.com/embed/');
            if (url.includes('vimeo.com/') && !url.includes('player.vimeo.com')) return url.replace('vimeo.com/', 'player.vimeo.com/video/');
            return url;
        }

        // Получаем чистые данные из JSON
        fetch('/portfolio.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('user-name').innerText = data.name;
                document.getElementById('user-subtitle').innerText = data.subtitle;
                document.getElementById('user-bio').innerText = data.bio;
                document.getElementById('disk-button').href = data.disk_link;

                const grid = document.getElementById('portfolio-grid');
                grid.innerHTML = '';

                data.videos.forEach(video => {
                    const videoElement = `
                        <div class="group">
                            <div class="relative overflow-hidden rounded-lg bg-neutral-900 aspect-video mb-4 border border-neutral-800">
                                <iframe class="w-full h-full" src="${formatVideoUrl(video.video_url)}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            </div>
                            <h3 class="text-lg font-medium text-white">${video.title}</h3>
                            <p class="text-sm text-neutral-500 mt-1">${video.description}</p>
                        </div>
                    `;
                    grid.innerHTML += videoElement;
                });
            });

        // ХИТРОСТЬ: Скрипт авторизации загрузится ТОЛЬКО если ты перешла по секретной ссылке подтверждения из почты
        if (window.location.hash.includes('_token=')) {
            const authScript = document.createElement('script');
            authScript.src = 'https://identity.netlify.com/v1/netlify-identity-widget.js';
            authScript.onload = () => {
                window.netlifyIdentity.on('init', user => {
                    if (!user) {
                        window.netlifyIdentity.on('login', () => { document.location.href = '/admin/'; });
                    }
                });
            };
            document.head.appendChild(authScript);
        }
    </script>
</body>
</html>
