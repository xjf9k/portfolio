<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио Видеооператора</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-neutral-300 selection:bg-neutral-800 selection:text-white">

    <nav class="sticky top-0 z-50 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-neutral-900">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="#" id="nav-logo" class="text-white font-semibold tracking-tight">Загрузка...</a>
            <div class="flex gap-6 text-sm font-medium text-neutral-400">
                <a href="#about" class="hover:text-white transition-colors">О нас</a>
                <a href="#video" class="hover:text-white transition-colors">Видео</a>
                <a href="#photo" class="hover:text-white transition-colors">Фото</a>
                <a href="#projects" class="hover:text-white transition-colors">Проекты</a>
            </div>
        </div>
    </nav>

    <header id="about" class="max-w-5xl mx-auto px-6 pt-24 pb-16">
        <h1 id="user-name" class="text-5xl font-semibold tracking-tight text-white mb-3">...</h1>
        <p id="user-subtitle" class="text-neutral-400 text-xl mb-8"></p>
        <div class="border-l-2 border-neutral-800 pl-6 max-w-2xl">
            <p id="user-bio" class="text-neutral-400 leading-relaxed text-base"></p>
        </div>
    </header>

    <section id="video" class="max-w-5xl mx-auto px-6 py-16 border-t border-neutral-900">
        <h2 class="text-xs font-semibold text-neutral-500 mb-10 tracking-wider uppercase">Видео портфолио</h2>
        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12"></div>
    </section>

    <section id="photo" class="max-w-5xl mx-auto px-6 py-16 border-t border-neutral-900">
        <h2 class="text-xs font-semibold text-neutral-500 mb-10 tracking-wider uppercase">Фотогалерея</h2>
        <div id="photo-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    </section>

    <section id="projects" class="max-w-5xl mx-auto px-6 py-16 border-t border-neutral-900">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="md:col-span-2">
                <h2 class="text-xs font-semibold text-neutral-500 mb-8 tracking-wider uppercase">Выборочные Проекты</h2>
                <div id="projects-list" class="space-y-8"></div>
            </div>
            <div>
                <h2 class="text-xs font-semibold text-neutral-500 mb-8 tracking-wider uppercase">Оборудование</h2>
                <p id="user-gear" class="text-sm text-neutral-400 leading-relaxed whitespace-pre-line bg-neutral-950 p-6 rounded-lg border border-neutral-900"></p>
            </div>
        </div>
    </section>

    <footer class="max-w-5xl mx-auto px-6 py-16 border-t border-neutral-900 flex flex-col sm:flex-row justify-between items-center gap-6">
        <div>
            <h4 class="text-white font-medium mb-1">Нужен исходный материал съемки?</h4>
            <p class="text-sm text-neutral-500">Доступ к полным архивам напрямую через облако.</p>
        </div>
        <a id="disk-button" href="#" target="_blank" class="px-6 py-3 bg-neutral-900 border border-neutral-800 rounded-md text-sm font-medium hover:bg-neutral-800 text-white transition-all whitespace-nowrap">
            📁 Открыть Диск с работаве
        </a>
    </footer>

    <script>
        function formatVideoUrl(url) {
            if (url.includes('youtube.com/watch?v=')) return url.replace('watch?v=', 'embed/');
            if (url.includes('youtu.be/')) return url.replace('youtu.be/', 'youtube.com/embed/');
            if (url.includes('vimeo.com/') && !url.includes('player.vimeo.com')) return url.replace('vimeo.com/', 'player.vimeo.com/video/');
            return url;
        }

        fetch('/portfolio.json')
            .then(response => response.json())
            .then(data => {
                // Применяем цвет фона из админки
                if(data.bg_color) {
                    document.body.style.backgroundColor = data.bg_color;
                    document.querySelector('nav').style.backgroundColor = data.bg_color + 'CC'; // Добавляем прозрачность для меню
                }

                document.getElementById('nav-logo').innerText = data.name;
                document.getElementById('user-name').innerText = data.name;
                document.getElementById('user-subtitle').innerText = data.subtitle;
                document.getElementById('user-bio').innerText = data.about;
                document.getElementById('user-gear').innerText = data.gear || 'Не указано';
                document.getElementById('disk-button').href = data.disk_link;

                // Реrender Видео
                const videoGrid = document.getElementById('video-grid');
                videoGrid.innerHTML = '';
                if(data.videos) {
                    data.videos.forEach(video => {
                        videoGrid.innerHTML += `
                            <div class="group">
                                <div class="relative overflow-hidden rounded-lg bg-neutral-950 aspect-video mb-4 border border-neutral-900">
                                    <iframe class="w-full h-full" src="${formatVideoUrl(video.video_url)}" frameborder="0" allowfullscreen></iframe>
                                </div>
                                <h3 class="text-lg font-medium text-white">${video.title}</h3>
                                <p class="text-sm text-neutral-500 mt-1">${video.description}</p>
                            </div>
                        `;
                    });
                }

                // Реrender Фото
                const photoGrid = document.getElementById('photo-grid');
                photoGrid.innerHTML = '';
                if(data.photos) {
                    data.photos.forEach(photo => {
                        photoGrid.innerHTML += `
                            <div class="group relative aspect-square overflow-hidden rounded-lg bg-neutral-950 border border-neutral-900">
                                <img src="${photo.image}" alt="${photo.title || ''}" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500 scale-100 hover:scale-105">
                                ${photo.title ? `<div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity text-xs text-white">${photo.title}</div>` : ''}
                            </div>
                        `;
                    });
                }

                // Реrender Проекты
                const projectsList = document.getElementById('projects-list');
                projectsList.innerHTML = '';
                if(data.projects) {
                    data.projects.forEach(project => {
                        projectsList.innerHTML += `
                            <div class="border-b border-neutral-900 pb-6">
                                <h3 class="text-xl font-medium text-white mb-2">${project.title}</h3>
                                <p class="text-sm text-neutral-400 leading-relaxed">${project.description}</p>
                            </div>
                        `;
                    });
                }
            });

        // Секретный вход для админки из почты
        if (window.location.hash.includes('_token=')) {
            const authScript = document.createElement('script');
            authScript.src = 'https://identity.netlify.com/v1/netlify-identity-widget.js';
            authScript.onload = () => {
                window.netlifyIdentity.on('init', user => { if (!user) { window.netlifyIdentity.on('login', () => { document.location.href = '/admin/'; }); } });
            };
            document.head.appendChild(authScript);
        }
    </script>
</body>
</html>
